<!DOCTYPE html>
<html>

<head>

<title>Gym Schedule Manager</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
}

.title{
text-align:center;
margin-top:30px;
font-weight:bold;
}

.card-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<h2 class="title">Gym Schedule Manager</h2>

<div class="card-box mt-4">

<div class="row g-2">

<div class="col-md-3">
<input id="name" class="form-control" placeholder="Nama Latihan">
</div>

<div class="col-md-2">

<select id="day" class="form-control">

<option value="">Pilih Hari</option>
<option>Senin</option>
<option>Selasa</option>
<option>Rabu</option>
<option>Kamis</option>
<option>Jumat</option>
<option>Sabtu</option>
<option>Minggu</option>

</select>

</div>

<div class="col-md-2">
<input id="time" type="time" class="form-control">
</div>

<div class="col-md-2">
<input id="duration" type="number" class="form-control" placeholder="Durasi (menit)">
</div>

<div class="col-md-3">

<button id="submitBtn"
class="btn btn-primary w-100"
onclick="addSchedule()">
Tambah Jadwal
</button>

</div>

</div>

</div>

<div class="card-box mt-4">

<h5 class="mb-3">Daftar Jadwal Gym</h5>

<table class="table table-striped table-hover text-center">

<thead class="table-dark">

<tr>
<th>Latihan</th>
<th>Hari</th>
<th>Waktu</th>
<th>Durasi</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="scheduleList"></tbody>

</table>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
